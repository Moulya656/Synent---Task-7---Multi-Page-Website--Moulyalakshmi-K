<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arun Digital | Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav class="nav-container">
            <div class="logo"><a href="index.html">ARUN DIGITAL</a></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div style="text-align: center; margin-bottom: 2rem;">
            <h2 class="page-title">Get In Touch</h2>
            <p style="color: #666;">Have a project in mind? Let's build something remarkable together.</p>
        </div>

        <div class="form-container">
            <form action="#" method="POST" onsubmit="event.preventDefault(); alert('Message sent successfully (Demo Only)!');">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label for="message">Your Message</label>
                    <textarea id="message" rows="5" placeholder="Tell us about your project goals..." required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Arun Digital Studio. All rights reserved.</p>
    </footer>

</body>
</html>
